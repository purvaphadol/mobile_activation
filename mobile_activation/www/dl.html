{% extends "templates/web.html" %}

{% block page_content %}
<div style="text-align: center; padding: 80px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    
    {% if error %}
        <h2 style="color: #1f2937; font-weight: 600; font-size: 1.5rem;">{{ error }}</h2>
        <p style="color: #6b7280; margin-bottom: 30px;">The link you followed might be broken or the record was deleted.</p>
        
        <a href="/app" style="text-decoration: none; color: #2490ef; font-weight: 500; border: 1px solid #2490ef; padding: 10px 20px; border-radius: 6px;">
            Back to Dashboard
        </a>

    {% else %}
        <div id="redirecting-ui">
            <div class="spinner" style="border: 3px solid #e5e7eb; border-top: 3px solid #2490ef; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            <h2 style="margin-top: 20px; color: #1f2937;">Opening in App...</h2>
            <!-- <p style="color: #6b7280;">{{ doctype }}: {{ name }}</p> -->
            
            <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 15px; align-items: center;">
                <a href="erpapp://open/{{ doctype }}/{{ name }}" 
                   style="background-color: #2490ef; color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: 600; width: 200px;">
                    Open Mobile App
                </a>
                
                <a href="{{ browser_url }}" style="color: #6b7280; text-decoration: none; font-size: 0.9rem;">
                    Continue in Browser
                </a>
            </div>
        </div>

        <script>
            (function() {
                const deepLink = "erpapp://open/{{ doctype }}/{{ name }}";
                const browserLink = "{{ browser_url }}";
                
                // Try to trigger mobile app
                window.location.href = deepLink;

                // Fallback to Browser after 2.5 seconds
                setTimeout(function() {
                    if (!document.hidden) {
                        window.location.href = browserLink;
                    }
                }, 2500);
            })();
        </script>
    {% endif %}
</div>

<style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    /* Hide header/footer if you want a clean splash screen */
    .web-footer, .navbar { display: none !important; } 
</style>
{% endblock %}
